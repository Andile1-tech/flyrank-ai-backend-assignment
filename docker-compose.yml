version: "3.9"

services:
  app:
    build: .

    container_name: flyrank_app

    ports:
      - "8000:8000"

    depends_on:
      - db

    env_file:
      - .env

  db:
    image: postgres:16

    container_name: flyrank_postgres

    restart: always

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: